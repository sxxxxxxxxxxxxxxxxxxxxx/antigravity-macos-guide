eight:650;line-height:1.7}.meta,.tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}.meta span,.tags span{padding:10px 13px;border:1px solid rgba(17,19,24,.1);border-radius:999px;background:rgba(255,255,255,.76);color:#525b6a;font-size:14px;font-weight:800}.tags span{color:#111318;background:#fff}.overview{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:1280px;margin:0 auto;padding:26px clamp(18px,4vw,56px) 48px}.overview div{padding:24px;border:1px solid rgba(17,19,24,.08);border-radius:18px;background:rgba(255,255,255,.72)}.overview h2{margin:0 0 8px;font-size:18px}.overview p{margin:0;color:#657083;line-height:1.7}.shell{display:grid;grid-template-columns:280px minmax(0,860px);gap:clamp(24px,4vw,54px);justify-content:center;align-items:start;max-width:1280px;margin:0 auto;padding:0 clamp(18px,4vw,56px) 88px}.toc{position:sticky;top:88px;max-height:calc(100vh - 116px);overflow:auto;padding:22px;border:1px solid rgba(17,19,24,.08);border-radius:18px;background:rgba(255,255,255,.72)}.toc-title{margin-bottom:12px;font-size:16px;font-weight:950}.toc ol{margin:0;padding:0;list-style:none}.toc a{display:block;padding:8px 0;color:#626c7d;font-size:14px;font-weight:750;line-height:1.4;text-decoration:none}.toc .sub{padding-left:16px}.switch{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding:16px;border-radius:14px;color:#fff;background:#111318;font-weight:900;text-decoration:none}.article{min-width:0;padding:clamp(26px,5vw,58px);border:1px solid rgba(17,19,24,.08);border-radius:24px;background:rgba(255,255,255,.86);box-shadow:0 18px 70px rgba(17,19,24,.08)}.article h2,.article h3{scroll-margin-top:112px;color:#111318}.article h2{margin:0 0 20px;padding-top:18px;font-size:clamp(30px,3vw,42px);line-height:1.22}.article h3{margin:40px 0 16px;font-size:clamp(22px,2vw,30px);line-height:1.28}.article p,.article li{color:#303846;font-size:18px;line-height:1.9}.article p{margin:0 0 20px}.article strong{color:#111318;font-weight:950}.article em{color:#626c7d}.article a{color:var(--accent);font-weight:850;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:4px}.article ul,.article ol{margin:0 0 26px;padding-left:1.35em}.article li+li{margin-top:10px}.article blockquote{margin:28px 0;padding:22px 24px;border:1px solid rgba(255,176,46,.28);border-left:5px solid #ffb02e;border-radius:16px;background:#fff8ea}.article blockquote p{margin:0;color:#4d3920}.article code{padding:.15em .42em;border-radius:7px;color:#0f5132;background:#eaf7ef;font-family:Consolas,monospace;font-size:.88em}.article pre{position:relative;margin:24px 0;overflow:auto;border-radius:16px;background:#111318}.article pre code{display:block;padding:24px;color:#eef2f7;background:transparent;font-size:15px;line-height:1.7}.copy{position:absolute;top:12px;right:12px;padding:8px 10px;border:1px solid rgba(255,255,255,.16);border-radius:10px;color:#fff;background:rgba(255,255,255,.1);cursor:pointer}.table-wrap{overflow:auto;margin:28px 0}.article table{width:100%;border-collapse:collapse}.article th,.article td{padding:14px 16px;border:1px solid rgba(17,19,24,.1);text-align:left;white-space:nowrap}.article th{background:#f0f3f7}.article figure{margin:30px 0}.article figure img{display:block;width:100%;max-height:820px;object-fit:contain;border:1px solid rgba(17,19,24,.08);border-radius:18px;background:#f3f4f6}.article figcaption{margin-top:10px;color:#7a8495;font-size:14px;font-weight:700;text-align:center}.article hr{height:1px;margin:42px 0;border:0;background:linear-gradient(90deg,transparent,rgba(17,19,24,.16),transparent)}.float{position:fixed;right:24px;bottom:24px;display:grid;width:48px;height:48px;place-items:center;border:1px solid rgba(17,19,24,.08);border-radius:50%;background:rgba(255,255,255,.86);box-shadow:0 12px 42px rgba(17,19,24,.12);text-decoration:none}@media(max-width:1050px){.hero,.overview,.shell{grid-template-columns:1fr}.toc{position:static;max-height:none}.toc ol{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:2px 18px}.toc .sub{padding-left:0}}@media(max-width:720px){.top{align-items:flex-start;flex-direction:column;padding:14px 16px}.hero{padding-top:28px}.hero-media,.hero-media img{min-height:210px}.hero h1{font-size:clamp(36px,11vw,52px)}.overview{gap:12px;padding-bottom:28px}.article{padding:24px 18px;border-radius:18px}.article p,.article li{font-size:16px;line-height:1.85}.toc ol{grid-template-columns:1fr}}

<body>
  <header class="top"><a class="brand" href="./"><span class="mark">A</span><span>Antigravity Guide</span></a><nav><a href="#content">阅读全文</a><a href="https://github.com/LuN3cy/antigravity-windows-guide" target="_blank" rel="noreferrer">Windows 指南</a></nav></header>
  <main>
    <section class="hero"><div class="hero-media"><img src="./assets/antigravity/cover.png" alt="Google Antigravity"><span class="chip">工具分享</span></div><div><div class="eyebrow">✦ MacOS Setup Guide</div><h1 id="title">Antigravity (MacOS) 深度配置与疑难解答指南</h1><p>面向 Mac 用户的 Antigravity 接入指南，重点解决客户端不走系统代理、账号授权受阻、模型无法加载与首次验证等高频问题。</p><div class="meta" id="meta"></div><div class="tags" id="tags"></div></div></section>
        <div class="shell" id="content"><aside class="toc"><div class="toc-title">目录</div><ol id="toc"></ol><a class="switch" href="https://github.com/LuN3cy/antigravity-windows-guide" target="_blank" rel="noreferrer"><span>Windows 指南</span><span>↗</span></a></aside><article class="article" id="article">正在加载文章...</article></div>
    <a class="float" href="#">↑</a>
  </main>
  <script>
    const platform = "MacOS";
    const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const inline = s => escapeHtml(s).replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>").replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1 ↗</a>').replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noreferrer">$1 ↗</a>');
    const slug = text => encodeURIComponent(text.replace(/[\*`#]/g,"").trim().replace(/\s+/g,"-"));
    function parseFrontmatter(raw){const m=raw.match(/^---[\r\n]+([\s\S]*?)[\r\n]+---[\r\n]+([\s\S]*)$/);const meta={title:"",date:"",tags:[]};if(!m)return{meta,body:raw};const lines=m[1].split(/\r?\n/);for(let i=0;i<lines.length;i++){const idx=lines[i].indexOf(":");if(idx<0)continue;const k=lines[i].slice(0,idx).trim();const v=lines[i].slice(idx+1).trim().replace(/^['"]|['"]$/g,"");if(k==="title")meta.title=v;if(k==="date")meta.date=v;if(k==="tags"){for(let j=i+1;j<lines.length;j++){const t=lines[j].trim();if(t.startsWith("- "))meta.tags.push(t.slice(2).trim());else if(t)break;}}}return{meta,body:m[2].trim()};}
    function render(md){const lines=md.split(/\r?\n/);let html="",toc=[],para=[],quote=[],code=[],table=[],inCode=false,list=null,seen=new Map();const closeP=()=>{if(para.length){html+=`<p>${inline(para.join(" "))}</p>`;para=[]}};const closeQ=()=>{if(quote.length){html+=`<blockquote>${quote.map(x=>`<p>${inline(x)}</p>`).join("")}</blockquote>`;quote=[]}};const closeL=()=>{closeP();if(list){html+=`</${list}>`;list=null}};const closeT=()=>{if(!table.length)return;const rows=table.map(r=>r.split("|").slice(1,-1).map(c=>c.trim()));html+='<div class="table-wrap"><table><thead><tr>'+rows[0].map(c=>`<th>${inline(c)}</th>`).join("")+"</tr></thead><tbody>";rows.slice(2).forEach(r=>html+="<tr>"+r.map(c=>`<td>${inline(c)}</td>`).join("")+"</tr>");html+="</tbody></table></div>";table=[]};const idFor=t=>{const b=slug(t);const n=seen.get(b)||0;seen.set(b,n+1);return n?`${b}-${n}`:b};for(const raw of lines){const line=raw.replace(/\s+$/,"");if(inCode){if(line.startsWith("```")){html+=`<pre><button class="copy" type="button">复制</button><code>${escapeHtml(code.join("\n"))}</code></pre>`;inCode=false;code=[]}else code.push(line);continue}if(line.startsWith("```")){closeP();closeQ();closeL();closeT();inCode=true;continue}if(/^\|.*\|$/.test(line)){closeP();closeQ();closeL();table.push(line);continue}else closeT();if(!line.trim()){closeP();closeQ();closeL();continue}if(line==="---"){closeP();closeQ();closeL();html+="<hr>";continue}const h=/^(#{2,3})\s+(.+)$/.exec(line);if(h){closeP();closeQ();closeL();const text=h[2].trim();const id=idFor(text);toc.push({level:h[1].length,text:text.replace(/[\*`]/g,""),id});html+=`<h${h[1].length} id="${id}">${inline(text)}</h${h[1].length}>`;continue}if(line.startsWith(">")){closeP();closeL();quote.push(line.replace(/^>\s?/,"").trim());continue}const img=/^!\[([^\]]*)\]\(([^)]+)\)/.exec(line.trim());if(img){closeP();closeQ();closeL();const src=img[2].replace(/^\/articles\/antigravity/,"./assets/antigravity");html+=`<figure><img src="${escapeHtml(src)}" alt="${escapeHtml(img[1])}" loading="lazy"><figcaption>${escapeHtml(img[1])}</figcaption></figure>`;continue}const ul=/^\s*[-*]\s+(.+)$/.exec(line),ol=/^\s*\d+\.\s+(.+)$/.exec(line);if(ul||ol){closeP();closeQ();const type=ul?"ul":"ol";if(list!==type){closeL();html+=`<${type}>`;list=type}html+=`<li>${inline((ul||ol)[1])}</li>`;continue}para.push(line.trim())}closeP();closeQ();closeL();closeT();return{html,toc}}
    fetch("./article.md").then(r=>r.text()).then(raw=>{const {meta,body}=parseFrontmatter(raw);const out=render(body);document.title=meta.title||document.title;document.getElementById("title").textContent=meta.title;document.getElementById("meta").innerHTML=`<span>${escapeHtml(meta.date)}</span><span>${platform}</span><span>${out.toc.filter(x=>x.level===2).length} 个章节</span>`;document.getElementById("tags").innerHTML=meta.tags.map(t=>`<span>${escapeHtml(t)}</span>`).join("");document.getElementById("toc").innerHTML=out.toc.map(x=>`<li class="${x.level===3?"sub":""}"><a href="#${x.id}">${escapeHtml(x.text)}</a></li>`).join("");document.getElementById("article").innerHTML=out.html;document.querySelectorAll(".copy").forEach(btn=>btn.addEventListener("click",async()=>{await navigator.clipboard.writeText(btn.nextElementSibling?.innerText||"");btn.textContent="已复制";setTimeout(()=>btn.textContent="复制",1200)}))});
  </script>
